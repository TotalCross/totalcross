name: Packages `totalcross`

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  package_totalcross:
    name: Package TotalCross
    if: ${{ always() }}
    needs: build
    runs-on: ubuntu-22.04

    steps:
    - name: Download SDK build artifacts
      uses: actions/download-artifact@v4
      with:
        name: sdk-build
        path: .

    - name: Extract SDK build artifacts
      run: tar -xzf sdk-build.tar.gz
 
    - name: Download Linux amd64
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-amd64
        path: linux-amd64

    - name: Manage Linux amd64 files
      if: ${{ success() }}
      run: |
        mkdir -p TotalCrossSDK/dist/vm/linux
        mkdir -p TotalCrossSDK/etc/launchers/linux
        cp -p -a -R linux-amd64/libtcvm.so TotalCrossSDK/dist/vm/linux/
        cp -p -a -R linux-amd64/Launcher TotalCrossSDK/etc/launchers/linux/
 
    - name: Download Linux arm32
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-arm32v7
        path: linux-arm32v7
 
    - name: Manage Linux arm32 files
      if: ${{ success() }}
      run: |
        mkdir -p TotalCrossSDK/dist/vm/linux_arm
        mkdir -p TotalCrossSDK/etc/launchers/linux_arm
        cp -p -a -R linux-arm32v7/libtcvm.so TotalCrossSDK/dist/vm/linux_arm/
        cp -p -a -R linux-arm32v7/Launcher TotalCrossSDK/etc/launchers/linux_arm/

    - name: Download Linux arm64
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-arm64
        path: linux-arm64

    - name: Manage Linux arm64 files
      if: ${{ success() }}
      run: |
        mkdir -p TotalCrossSDK/dist/vm/linux_arm64
        mkdir -p TotalCrossSDK/etc/launchers/linux_arm64
        cp -p -a -R linux-arm64/libtcvm.so TotalCrossSDK/dist/vm/linux_arm64/
        cp -p -a -R linux-arm64/Launcher TotalCrossSDK/etc/launchers/linux_arm64/

    - name: Download Windows
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: windows

    - name: Manage Windows files
      if: ${{ success() }}
      shell: bash
      run: |
        mkdir -p TotalCrossSDK/dist/vm/win32
        mkdir -p TotalCrossSDK/etc/launchers/win32
        find windows -iname "tcvm.dll" -exec cp -p -a -R {} TotalCrossSDK/dist/vm/win32/TCVM.dll \; -quit
        find windows -iname "launcher.exe" -exec cp -p -a -R {} TotalCrossSDK/etc/launchers/win32/Launcher.exe \; -quit

    - name: Download Android
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: android
        path: android

    - name: Manage Android files
      if: ${{ success() }}
      shell: bash
      run: |
        android_artifact="$(find android -name "TotalCross.aab" -type f -print -quit)"
        if [ -z "$android_artifact" ]; then
          echo "Could not find TotalCross.aab in Android build artifact" >&2
          exit 1
        fi

        mkdir -p TotalCrossSDK/dist/vm/android
        mkdir -p TotalCrossSDK/etc/launchers/android
        mkdir -p TotalCrossSDK/etc/tools/android
        cp -p -a -R "$android_artifact" TotalCrossSDK/dist/vm/android/TotalCross.aab

    - name: Download iOS
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: ios
        path: ios

    - name: Manage iOS files
      if: ${{ success() }}
      shell: bash
      run: |
        mkdir -p TotalCrossSDK/dist/vm/ios
        find ios -name "TotalCross.app" -type d -exec cp -p -a -R {} TotalCrossSDK/dist/vm/ios/ \; -quit

    - name: Manage files
      shell: bash
      run: |
        outdir="build/TotalCross"

        rm -rf "$outdir"
        mkdir -p "$outdir/dist/vm" "$outdir/docs/html"

        cp TotalCrossSDK/license.txt "$outdir/"

        rsync --recursive \
          --exclude=obfuscator \
          --exclude=scripts \
          --exclude='tools/ant/*[0-9].jar' \
          --exclude=tools/jdeb \
          --exclude='tools/makecab/*.inf' \
          TotalCrossSDK/etc \
          "$outdir/"

        rsync \
          --exclude='*-intermediate.jar' \
          --exclude='*-proguard.jar' \
          TotalCrossSDK/build/libs/totalcross-sdk*.jar \
          "$outdir/dist/"
        cp TotalCrossSDK/build/libs/totalcross-sdk-?.?.?.jar "$outdir/dist/totalcross-sdk.jar"
        cp TotalCrossSDK/build/libs/*.tcz "$outdir/dist/vm/"
        cp TotalCrossSDK/etc/fonts/TCFont.tcz "$outdir/dist/vm/"

        cp -R TotalCrossSDK/build/docs/javadoc/. "$outdir/docs/html/"

        rsync --recursive -m \
          --exclude=test \
          --exclude='jdkcompat*' \
          --exclude=ras \
          --exclude=tc/tools \
          --exclude='**/package.html' \
          --exclude='**/subbuild.xml' \
          --exclude='**/*4D.java' \
          TotalCrossSDK/src \
          "$outdir/"

        rsync --recursive TotalCrossSDK/dist/vm/ "$outdir/dist/vm/"
        rsync --recursive TotalCrossSDK/etc/launchers/ "$outdir/etc/launchers/"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TotalCross
        path: |
          build/TotalCross/
