name: Packages `totalcross`

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      signed-ios: true
    secrets: inherit

  package_totalcross:
    name: Package TotalCross
    if: ${{ always() }}
    needs: build
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.totalcross-version.outputs.version }}

    steps:
    - name: Download SDK build artifacts
      uses: actions/download-artifact@v4
      with:
        name: sdk-build
        path: .

    - name: Extract SDK build artifacts
      run: tar -xzf sdk-build.tar.gz
 
    - name: Download Linux amd64
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-amd64
        path: linux-amd64

    - name: Manage Linux amd64 files
      if: ${{ success() }}
      run: |
        mkdir -p build/TotalCross/dist/vm/linux
        mkdir -p build/TotalCross/etc/launchers/linux
        cp -p -a -R linux-amd64/libtcvm.so build/TotalCross/dist/vm/linux/
        cp -p -a -R linux-amd64/Launcher build/TotalCross/etc/launchers/linux/
 
    - name: Download Linux arm32
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-arm32v7
        path: linux-arm32v7
 
    - name: Manage Linux arm32 files
      if: ${{ success() }}
      run: |
        mkdir -p build/TotalCross/dist/vm/linux_arm
        mkdir -p build/TotalCross/etc/launchers/linux_arm
        cp -p -a -R linux-arm32v7/libtcvm.so build/TotalCross/dist/vm/linux_arm/
        cp -p -a -R linux-arm32v7/Launcher build/TotalCross/etc/launchers/linux_arm/

    - name: Download Linux arm64
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: linux-arm64
        path: linux-arm64

    - name: Manage Linux arm64 files
      if: ${{ success() }}
      run: |
        mkdir -p build/TotalCross/dist/vm/linux_arm64
        mkdir -p build/TotalCross/etc/launchers/linux_arm64
        cp -p -a -R linux-arm64/libtcvm.so build/TotalCross/dist/vm/linux_arm64/
        cp -p -a -R linux-arm64/Launcher build/TotalCross/etc/launchers/linux_arm64/

    - name: Download Windows
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: windows
        path: windows

    - name: Manage Windows files
      if: ${{ success() }}
      shell: bash
      run: |
        mkdir -p build/TotalCross/dist/vm/win32
        mkdir -p build/TotalCross/etc/launchers/win32
        find windows -iname "tcvm.dll" -exec cp -p -a -R {} build/TotalCross/dist/vm/win32/tcvm.dll \; -quit
        find windows -iname "launcher.exe" -exec cp -p -a -R {} build/TotalCross/etc/launchers/win32/Launcher.exe \; -quit

    - name: Download Android
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: android
        path: android

    - name: Manage Android files
      if: ${{ success() }}
      shell: bash
      run: |
        android_artifact="$(find android -name "TotalCross.aab" -type f -print -quit)"
        if [ -z "$android_artifact" ]; then
          echo "Could not find TotalCross.aab in Android build artifact" >&2
          exit 1
        fi

        mkdir -p build/TotalCross/dist/vm/android
        mkdir -p build/TotalCross/etc/launchers/android
        mkdir -p build/TotalCross/etc/tools/android
        cp -p -a -R "$android_artifact" build/TotalCross/dist/vm/android/TotalCross.aab

    - name: Download iOS
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: ios
        path: ios

    - name: Manage iOS files
      if: ${{ success() }}
      shell: bash
      run: |
        mkdir -p build/TotalCross/dist/vm/ios
        mkdir -p build/TotalCross/etc/tools/iOSCodesign
        mkdir -p ios/extracted
        tar -xzf ios/ios.tar.gz -C ios/extracted
        cp -p -a -R ios/extracted/TotalCross.xcarchive build/TotalCross/etc/tools/iOSCodesign/
        cp -p -a ios/extracted/TotalCross.ipa/TotalCross.ipa build/TotalCross/dist/vm/ios/

    - name: Read TotalCross version
      id: totalcross-version
      shell: bash
      run: |
        version="$(find build/TotalCross/dist -maxdepth 1 -type f -regex '.*/totalcross-sdk-[0-9]+\.[0-9]+\.[0-9]+\.jar' -print -quit)"
        version="${version##*/}"
        version="${version#totalcross-sdk-}"
        version="${version%.jar}"
        if [ -z "$version" ]; then
          echo "Could not determine TotalCross version from packaged SDK jar" >&2
          exit 1
        fi

        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Create packaged SDK zip
      shell: bash
      run: |
        cd build
        zip -r "TotalCross-${{ steps.totalcross-version.outputs.version }}.zip" TotalCross

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TotalCross-${{ steps.totalcross-version.outputs.version }}
        path: build/TotalCross-${{ steps.totalcross-version.outputs.version }}.zip

    - name: Upload dist jars
      uses: actions/upload-artifact@v4
      with:
        name: TotalCross-${{ steps.totalcross-version.outputs.version }}-jars
        path: build/TotalCross/dist/*.jar

  test_packaged_zip:
    name: Test packaged ZIP on ${{ matrix.name }}
    needs: package_totalcross
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86/64
            runner: windows-2022
          - name: macOS ARM
            runner: macos-15
          - name: Linux x86/64
            runner: ubuntu-22.04

    steps:
    - name: Setup JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 11

    - name: Download packaged SDK zip
      uses: actions/download-artifact@v4
      with:
        name: TotalCross-${{ needs.package_totalcross.outputs.version }}
        path: packaged

    - name: Test packaged SDK deploy
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $zipPath = Join-Path 'packaged' 'TotalCross-${{ needs.package_totalcross.outputs.version }}.zip'
        $extractPath = Join-Path $PWD 'packaged-sdk'
        Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

        $env:TOTALCROSS3_HOME = Join-Path $extractPath 'TotalCross'
        "TOTALCROSS3_HOME=$env:TOTALCROSS3_HOME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        $sdkJar = Join-Path $env:TOTALCROSS3_HOME 'dist/totalcross-sdk-${{ needs.package_totalcross.outputs.version }}.jar'
        if (-not (Test-Path -LiteralPath $sdkJar -PathType Leaf)) {
          throw "Packaged SDK jar not found: $sdkJar"
        }

        $workDir = Join-Path $PWD 'package-test'
        New-Item -ItemType Directory -Force -Path $workDir | Out-Null

        @'
        import totalcross.ui.Label;
        import totalcross.ui.MainWindow;

        public class HelloWorld extends MainWindow {

            @Override
            public void initUI() {
                add(new Label("Hello World"), CENTER, CENTER);
            }
        }
        '@ | Set-Content -Path (Join-Path $workDir 'HelloWorld.java') -Encoding utf8

        javac -source 7 -target 7 -cp $sdkJar -d $workDir (Join-Path $workDir 'HelloWorld.java')

        Push-Location $workDir
        try {
          java -cp $sdkJar tc.Deploy (Join-Path $workDir 'HelloWorld.class') -win32 -android -ios -linux -linux_arm /n 'Hello World'
        } finally {
          Pop-Location
        }

        $installDir = Join-Path $workDir 'install'
        $expectedFiles = @(
          'win32/Hello World.exe',
          'win32/Hello World.tcz',
          'win32/tcvm.dll',
          'win32/vcruntime140.dll',
          'android/HelloWorld.aab',
          'android/HelloWorld.apk',
          'ios/Hello World.ipa',
          'linux/Hello World',
          'linux/Hello World.tcz',
          'linux/libtcvm.so',
          'linux_arm/Hello World',
          'linux_arm/Hello World.tcz',
          'linux_arm/libtcvm.so'
        )

        foreach ($file in $expectedFiles) {
          $path = Join-Path $installDir $file
          if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
            throw "Expected deploy artifact not found: $path"
          }
        }

        $expectedDirectories = @('win32', 'android', 'ios', 'linux', 'linux_arm')
        foreach ($directory in $expectedDirectories) {
          $path = Join-Path $installDir $directory
          if (-not (Test-Path -LiteralPath $path -PathType Container)) {
            throw "Expected deploy directory not found: $path"
          }
        }
