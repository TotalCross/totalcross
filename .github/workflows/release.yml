name: Release

on:
  push:
    tags:
    - 'v*' # Push events to matching v*, i.e. v6.1.1, v7.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version (name of the tag to be referenced)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          if [ -z "$version" ]; then
            echo "Could not determine release version" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download packaged SDK
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: package.yml
          workflow_conclusion: success
          name: TotalCross-${{ steps.release-version.outputs.version }}
          path: release-assets

      - name: Download packaged jars
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: package.yml
          workflow_conclusion: success
          name: TotalCross-${{ steps.release-version.outputs.version }}-jars
          path: release-assets/jars

      - name: Upload jars to Artifactory
        shell: bash
        env:
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
        run: |
          set -euo pipefail

          version="${{ steps.release-version.outputs.version }}"
          artifactory_url="https://maven.totalcross.com/artifactory"
          repository="repo1-release"
          group_path="com/totalcross"
          artifact_id="totalcross-sdk"
          artifact_base_url="${artifactory_url}/${repository}/${group_path}/${artifact_id}/${version}"
          jars_dir="release-assets/jars"
          main_jar="${jars_dir}/${artifact_id}-${version}.jar"
          javadoc_jar="${jars_dir}/${artifact_id}-${version}-javadoc.jar"
          sources_jar="${jars_dir}/${artifact_id}-${version}-sources.jar"
          pom_file="$(mktemp)"

          if [ -z "$JFROG_USER" ] || [ -z "$JFROG_PASSWORD" ]; then
            echo "JFROG_USER and JFROG_PASSWORD secrets must be configured" >&2
            exit 1
          fi

          for artifact in "$main_jar" "$javadoc_jar" "$sources_jar"; do
            if [ ! -f "$artifact" ]; then
              echo "Could not find Artifactory artifact: $artifact" >&2
              exit 1
            fi
          done

          unzip -p "$main_jar" "META-INF/maven/com.totalcross/${artifact_id}/pom.xml" > "$pom_file"
          if [ ! -s "$pom_file" ]; then
            echo "Could not extract Maven POM from $main_jar" >&2
            exit 1
          fi

          upload_artifact() {
            local file="$1"
            local name="$2"

            curl \
              --fail \
              --show-error \
              --silent \
              --user "${JFROG_USER}:${JFROG_PASSWORD}" \
              --upload-file "$file" \
              "${artifact_base_url}/${name}"
          }

          upload_artifact "$pom_file" "${artifact_id}-${version}.pom"
          upload_artifact "$main_jar" "${artifact_id}-${version}.jar"
          upload_artifact "$javadoc_jar" "${artifact_id}-${version}-javadoc.jar"
          upload_artifact "$sources_jar" "${artifact_id}-${version}-sources.jar"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::801206326054:role/github-action-release
          aws-region: us-east-1

      - name: Upload release zip to S3
        shell: bash
        run: |
          version="${{ steps.release-version.outputs.version }}"
          zip_asset="release-assets/TotalCross-${version}.zip"
          version_prefix="$(echo "$version" | awk -F. '{ print $1 "." $2 }')"
          s3_uri="s3://totalcross-release/${version_prefix}/TotalCross-${version}.zip"

          if [ ! -f "$zip_asset" ]; then
            echo "Could not find release zip: $zip_asset" >&2
            exit 1
          fi

          aws s3 cp "$zip_asset" "$s3_uri"

      - name: Extract release notes
        run: |
          version="${{ steps.release-version.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" {
              emit = 1
              print
              next
            }
            emit && /^## \[[0-9]+\.[0-9]+\.[0-9]+\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$/ {
              exit
            }
            emit {
              print
            }
          ' CHANGELOG.md > "CHANGELOG-${{ steps.release-version.outputs.tag }}.md"

          if [ ! -s "CHANGELOG-${{ steps.release-version.outputs.tag }}.md" ]; then
            echo "Could not find changelog entry for ${version}" >&2
            exit 1
          fi

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release-version.outputs.tag }}"
          version="${{ steps.release-version.outputs.version }}"
          notes="CHANGELOG-${tag}.md"
          zip_asset="release-assets/TotalCross-${version}.zip"

          gh release create "$tag" \
            --verify-tag \
            --title "Release ${tag}" \
            --notes-file "$notes" \
            "$zip_asset" \
            release-assets/jars/*.jar
