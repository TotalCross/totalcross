name: Commit Message Check

on:
  push:
  pull_request:

jobs:
  check-commit-message:
    name: Validate commit messages
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------------------
      # Validate commit title format:
      # <type>(<scope>[,<platform>][,<arch>]): short description
      #
      # - type must be one of the project-defined technical types
      # - scope is required and must come first
      # - platform and arch are optional extra qualifiers
      # - all qualifiers must be lowercase
      # - description must be lowercase
      # - maximum title length is enforced separately
      # --------------------------------------------------------------------
      - name: Check commit type and format
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^(vm|runtime|sdk|compiler|tools|build|perf|fix|refactor|test|doc|chore)\([a-z0-9_-]+(,[a-z0-9_-]+){0,2}\): [a-z0-9 ].*$'
          error: |
            Invalid commit title format.

            Expected:
              <type>(<scope>[,<platform>][,<arch>]): short description

            Examples:
              vm(gc): fix invalid mark on promoted objects
              fix(socket,posix): handle eof correctly
              build(cmake,windows,x86): fix static linking

      # --------------------------------------------------------------------
      # Ensure the commit title starts with a lowercase letter.
      # This avoids sentence-style or prose-like titles.
      # --------------------------------------------------------------------
      - name: Check title capitalization
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^[^A-Z]'
          error: 'Commit title must not start with an uppercase letter.'

      # --------------------------------------------------------------------
      # Enforce a meaningful commit title:
      # - At least 3 words to avoid vague messages like "fix bug".
      # --------------------------------------------------------------------
      - name: Check title word count
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^[^ ]+([ \t]+[^ ]+){2,}'
          flags: 's'
          error: 'Commit title must contain at least 3 words.'

      # --------------------------------------------------------------------
      # Enforce maximum commit title length (80 characters).
      # The body is checked separately.
      # --------------------------------------------------------------------
      - name: Check title length
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^([^\n]{1,80})(\n.*)?$'
          flags: 's'
          error: 'Commit title must be 80 characters or less.'

      # --------------------------------------------------------------------
      # If a commit body is present, it must be separated from the title
      # by a blank line.
      # --------------------------------------------------------------------
      - name: Check blank line between title and body
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^[^\n]+(\n\n.+)?$'
          flags: 's'
          error: 'If a commit body is present, it must be separated from the title by a blank line.'

      # --------------------------------------------------------------------
      # Enforce body line length (80 characters per line).
      # This improves readability and long-term maintainability.
      # --------------------------------------------------------------------
      - name: Check commit body line length
        uses: gsactions/commit-message-checker@v1
        with:
          pattern: '^[^\n]+(\n[^\n]{0,80})*$'
          flags: 's'
          error: 'Each line in the commit body must be 80 characters or less.'
