name: Merge flow
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux:
    name: Build '${{ matrix.project }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: linux-amd64
            runner: ubuntu-22.04
            use_qemu: true
          - project: linux-arm32v7
            runner: ubuntu-22.04
            use_qemu: true
          - project: linux-arm64
            runner: ubuntu-22.04-arm
            use_qemu: false

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Cache Skia artifacts
      uses: actions/cache@v5
      with:
        path: TotalCrossVM/skia/local
        key: skia-${{ matrix.project }}-${{ hashFiles('TotalCrossVM/skia/artifacts.json') }}

    - name: Allow multiarch
      if: ${{ matrix.use_qemu }}
      run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

    - name: Build VM & Launcher
      run: |
        docker run -v ${PWD}:/sources -t totalcross/${{ matrix.project }}:v1.0.0 bash -lc "
          apt-get update &&
          apt-get install -y apt-transport-https ca-certificates gnupg wget &&
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | apt-key add - &&
          echo 'deb https://apt.kitware.com/ubuntu/ bionic main' > /etc/apt/sources.list.d/kitware.list &&
          apt-get update &&
          apt-get install -y cmake curl git rsync &&
          cmake --version &&
          cmake /sources/TotalCrossVM -DCMAKE_BUILD_TYPE=Release ${{ matrix.project == 'linux-arm32v7' && '-DPNG_ARM_NEON_OPT=0' || '' }} -G Ninja &&
          ninja
        "

  build-linux-arm32v7-cross:
    name: Build `linux-arm32v7-cross`
    # Temporarily disabled; remove this condition to re-enable the cross build.
    if: ${{ false }}
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Install cross toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          curl \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          git \
          ninja-build \
          rsync

    - name: Build VM & Launcher
      run: |
        cmake TotalCrossVM \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=${PWD}/TotalCrossVM/cmake/toolchains/linux-arm32v7.cmake \
          -DPNG_ARM_NEON_OPT=0 \
          -G Ninja
        ninja

  build-windows:
    name: Build `windows`
    runs-on: windows-2022

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Build VM
      shell: cmd
      run: |
        mkdir TotalCrossVM\vc2022
        pushd TotalCrossVM\vc2022
        cmake ..\ -G"Visual Studio 17 2022" -A Win32
        cmake --build . --config Release
        popd
          
  build-sdk:
    name: Build `SDK`
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 11

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Build SDK
      working-directory: TotalCrossSDK
      run: ./gradlew dist -x test --stacktrace

  build-android:
    name: Build `Android`
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Cache Skia artifacts
      uses: actions/cache@v5
      with:
        path: |
          TotalCrossVM/skia/local
          TotalCrossVM/android/tcvm/src/main/jniLibs
        key: skia-android-${{ hashFiles('TotalCrossVM/skia/artifacts.json') }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: ''

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Build Android
      working-directory: TotalCrossVM/android
      run: ./gradlew assembleRelease -x test --stacktrace

  build-ios:
    name: Build `iOS`
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Cache Skia artifacts
      uses: actions/cache@v5
      with:
        path: TotalCrossVM/skia/local
        key: skia-ios-${{ hashFiles('TotalCrossVM/skia/artifacts.json') }}

    - name: Show tool versions
      run: |
        xcodebuild -version
        cmake --version
        pod --version

    - name: Generate and patch Xcode project
      working-directory: TotalCrossVM/xcode
      run: |
        cmake ../ -GXcode
        ruby -pi -e "gsub(\"config.build_settings['ARCHS[sdk=iphonesimulator*]'] = 'x86_64'\", \"config.build_settings['ARCHS[sdk=iphonesimulator*]'] = 'arm64'\")" Podfile
        pod install
        /usr/libexec/PlistBuddy -c "Add :DisableBuildSystemDeprecationDiagnostic bool" TotalCross.xcworkspace/xcshareddata/WorkspaceSettings.xcsettings || true
        /usr/libexec/PlistBuddy -c "Set :DisableBuildSystemDeprecationDiagnostic true" TotalCross.xcworkspace/xcshareddata/WorkspaceSettings.xcsettings
        ruby ../../scripts/fix-ios-xcode-dependencies.rb TCVM.xcodeproj/project.pbxproj

    - name: Build iOS app for device
      working-directory: TotalCrossVM/xcode
      run: |
        xcodebuild \
          -workspace TotalCross.xcworkspace \
          -scheme TotalCross \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          build
