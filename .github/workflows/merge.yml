name: Merge flow
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux:
    name: Build '${{ matrix.project }}'
    strategy:
      fail-fast: false
      matrix:
        project: [ linux-amd64, linux-arm32v7, linux-arm64 ]

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Allow multiarch
      run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

    - name: Build VM & Launcher
      run: |
        docker run -v ${PWD}:/sources -t totalcross/${{ matrix.project }}:v1.0.0 bash -lc "
          apt-get update &&
          apt-get install -y apt-transport-https ca-certificates gnupg wget &&
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | apt-key add - &&
          echo 'deb https://apt.kitware.com/ubuntu/ bionic main' > /etc/apt/sources.list.d/kitware.list &&
          if [ '${{ matrix.project }}' = 'linux-arm64' ]; then
            apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 1E9377A2BA9EF27F &&
            echo 'deb http://ppa.launchpad.net/ubuntu-toolchain-r/test/ubuntu bionic main' > /etc/apt/sources.list.d/ubuntu-toolchain-r-test.list &&
            apt-get update &&
            apt-get install -y gcc-10 g++-10;
          fi &&
          apt-get update &&
          apt-get install -y cmake curl git rsync &&
          cmake --version &&
          if [ '${{ matrix.project }}' = 'linux-arm64' ]; then
            CC=gcc-10 CXX=g++-10 cmake /sources/TotalCrossVM -DCMAKE_BUILD_TYPE=Release -G Ninja;
          else
            cmake /sources/TotalCrossVM -DCMAKE_BUILD_TYPE=Release -G Ninja;
          fi &&
          ninja
        "

  build-windows:
    name: Build `windows`
    runs-on: windows-2022

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Build VM
      shell: cmd
      run: |
        mkdir TotalCrossVM\vc2022
        pushd TotalCrossVM\vc2022
        cmake ..\ -G"Visual Studio 17 2022" -A Win32
        cmake --build . --config Release
        popd
          
  build-sdk:
    name: Build `SDK`
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Build SDK
      working-directory: TotalCrossSDK
      run: ./gradlew dist -x test --stacktrace

  build-android:
    name: Build `Android`
    runs-on: ubuntu-22.04
    container:
      image: docker://fabernovel/android:api-29-ndk-v1.2.0

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Install native build tools
      run: |
        apt-get update
        apt-get install -y curl git python3 rsync tar

    - name: Build Android
      working-directory: TotalCrossVM/android
      run: ./gradlew assembleRelease -x test --stacktrace
