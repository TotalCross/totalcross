name: Build
on:
  workflow_call:
    inputs:
      signed-ios:
        description: Build and export a signed iOS IPA
        required: false
        type: boolean
        default: false

env:
  SQLITE3_GITHUB_TOKEN: ${{ secrets.SQLITE3_GITHUB_TOKEN }}
  ZLIB_NG_GITHUB_TOKEN: ${{ secrets.ZLIB_NG_GITHUB_TOKEN }}
  LIBPNG_GITHUB_TOKEN: ${{ secrets.LIBPNG_GITHUB_TOKEN }}

jobs:
  checkout-source:
    name: Checkout source code
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

    - name: Pack source code
      run: tar --exclude=.git -czf "${RUNNER_TEMP}/source-code.tar.gz" .

    - name: Upload source code
      uses: actions/upload-artifact@v7
      with:
        name: source-code
        path: ${{ runner.temp }}/source-code.tar.gz
        retention-days: 1

  build-linux:
    name: Build '${{ matrix.project }}'
    needs: checkout-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: linux-amd64
            runner: ubuntu-22.04
            docker_platform: linux/amd64
            use_qemu: false
          - project: linux-arm32v7
            runner: ubuntu-22.04
            docker_platform: linux/arm/v7
            use_qemu: true
          - project: linux-arm64
            runner: ubuntu-22.04-arm
            docker_platform: linux/arm64
            use_qemu: false

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      run: tar -xzf source-code.tar.gz

    - name: Export dependency overrides
      env:
        SQLITE3_RELEASE_TAG_OVERRIDE: ${{ vars.SQLITE3_RELEASE_TAG }}
        SQLITE3_GITHUB_REPO_OVERRIDE: ${{ secrets.SQLITE3_GITHUB_REPO }}
        ZLIB_NG_RELEASE_TAG_OVERRIDE: ${{ vars.ZLIB_NG_RELEASE_TAG }}
        ZLIB_NG_GITHUB_REPO_OVERRIDE: ${{ secrets.ZLIB_NG_GITHUB_REPO }}
        LIBPNG_RELEASE_TAG_OVERRIDE: ${{ vars.LIBPNG_RELEASE_TAG }}
        LIBPNG_GITHUB_REPO_OVERRIDE: ${{ secrets.LIBPNG_GITHUB_REPO }}
        SKIA_RELEASE_TAG_OVERRIDE: ${{ vars.SKIA_RELEASE_TAG }}
        SKIA_GITHUB_REPO_OVERRIDE: ${{ secrets.SKIA_GITHUB_REPO }}
      run: |
        for name in \
          SQLITE3_RELEASE_TAG SQLITE3_GITHUB_REPO \
          ZLIB_NG_RELEASE_TAG ZLIB_NG_GITHUB_REPO \
          LIBPNG_RELEASE_TAG LIBPNG_GITHUB_REPO \
          SKIA_RELEASE_TAG SKIA_GITHUB_REPO
        do
          value_name="${name}_OVERRIDE"
          if [ -n "${!value_name:-}" ]; then
            printf '%s=%s\n' "$name" "${!value_name}" >> "$GITHUB_ENV"
          fi
        done

    - name: Fetch depot tools metadata
      run: TotalCrossVM/fetch-depot-tools.sh

    - name: Cache artifacts
      uses: actions/cache@v5
      with:
        path: |
          TotalCrossVM/deps/totalcross-depot-tools/skia/local
          TotalCrossVM/deps/totalcross-depot-tools/zlib-ng/local
          TotalCrossVM/deps/totalcross-depot-tools/libpng/local
          TotalCrossVM/deps/totalcross-depot-tools/sqlite3/local
          TotalCrossVM/deps/totalcross-depot-tools/mbedtls/local
        key: native-deps-${{ matrix.project }}-${{ hashFiles('TotalCrossVM/deps/totalcross-depot-tools/deps.yml', 'TotalCrossVM/fetch-depot-tools.sh') }}

    - name: Cache C/C++ compilation
      uses: actions/cache@v5
      with:
        path: .ccache
        key: ccache-${{ matrix.project }}-${{ hashFiles('TotalCrossVM/CMakeLists.txt', 'TotalCrossVM/src/**/*.c', 'TotalCrossVM/src/**/*.cc', 'TotalCrossVM/src/**/*.cpp', 'TotalCrossVM/src/**/*.h', 'TotalCrossVM/src/**/*.hpp', 'TotalCrossVM/modules/**/*.cmake', 'TotalCrossVM/third_party/**/*.c', 'TotalCrossVM/third_party/**/*.cc', 'TotalCrossVM/third_party/**/*.cpp', 'TotalCrossVM/third_party/**/*.h', 'TotalCrossVM/third_party/**/*.hpp', 'TotalCrossVM/third_party/**/CMakeLists.txt', 'TotalCrossVM/third_party/**/*.cmake') }}
        restore-keys: |
          ccache-${{ matrix.project }}-

    - name: Allow multiarch
      if: ${{ matrix.use_qemu }}
      run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

    - name: Build VM & Launcher
      run: |
        mkdir -p build .ccache
        DOCKER_ENV_ARGS=(
          -e CCACHE_DIR=/ccache
          -e CCACHE_BASEDIR=/sources
          -e CCACHE_COMPRESS=true
          -e CCACHE_MAXSIZE=1G
          -e SQLITE3_GITHUB_TOKEN
          -e ZLIB_NG_GITHUB_TOKEN
          -e LIBPNG_GITHUB_TOKEN
        )
        for env_name in \
          SQLITE3_RELEASE_TAG SQLITE3_GITHUB_REPO \
          ZLIB_NG_RELEASE_TAG ZLIB_NG_GITHUB_REPO \
          LIBPNG_RELEASE_TAG LIBPNG_GITHUB_REPO \
          SKIA_RELEASE_TAG SKIA_GITHUB_REPO
        do
          if [ -n "${!env_name:-}" ]; then
            DOCKER_ENV_ARGS+=(-e "$env_name")
          fi
        done
        docker run --platform ${{ matrix.docker_platform }} \
          "${DOCKER_ENV_ARGS[@]}" \
          -v ${PWD}/build:/build \
          -v ${PWD}/.ccache:/ccache \
          -v ${PWD}:/sources \
          -t totalcross/${{ matrix.project }}:v1.0.7 bash -lc '
          set -e
          cmake --version
          if command -v ccache >/dev/null; then
            ccache --zero-stats || true
            CMAKE_CCACHE_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          else
            echo "::warning::ccache is not installed in this Docker image; building without compiler cache"
            CMAKE_CCACHE_ARGS=""
          fi
          cmake /sources/TotalCrossVM -DCMAKE_BUILD_TYPE=Release ${{ matrix.project == 'linux-arm32v7' && '-DPNG_ARM_NEON_OPT=0' || '' }} ${CMAKE_CCACHE_ARGS} -G Ninja &&
          ninja
          if command -v ccache >/dev/null; then
            ccache --show-stats || true
          fi
        '

    - name: Fix Docker-owned files
      if: ${{ always() }}
      run: |
        sudo chown -R "$USER:$USER" \
          build \
          .ccache \
          TotalCrossVM/deps/totalcross-depot-tools/skia/local \
          TotalCrossVM/deps/totalcross-depot-tools/zlib-ng/local \
          TotalCrossVM/deps/totalcross-depot-tools/libpng/local \
          TotalCrossVM/deps/totalcross-depot-tools/sqlite3/local \
          TotalCrossVM/deps/totalcross-depot-tools/mbedtls/local

    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.project }}
        path: build

  build-linux-arm32v7-cross:
    name: Build `linux-arm32v7-cross`
    # Temporarily disabled; remove this condition to re-enable the cross build.
    if: ${{ false }}
    needs: checkout-source
    runs-on: ubuntu-22.04

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      run: tar -xzf source-code.tar.gz

    - name: Install cross toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          curl \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          git \
          ninja-build \
          rsync

    - name: Build VM & Launcher
      run: |
        cmake TotalCrossVM \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE=${PWD}/TotalCrossVM/cmake/toolchains/linux-arm32v7.cmake \
          -DPNG_ARM_NEON_OPT=0 \
          -G Ninja
        ninja

  build-windows:
    name: Build `windows`
    needs: checkout-source
    runs-on: windows-2022

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      shell: bash
      run: tar -xzf source-code.tar.gz

    - name: Export dependency overrides
      shell: bash
      env:
        SQLITE3_RELEASE_TAG_OVERRIDE: ${{ vars.SQLITE3_RELEASE_TAG }}
        SQLITE3_GITHUB_REPO_OVERRIDE: ${{ secrets.SQLITE3_GITHUB_REPO }}
        ZLIB_NG_RELEASE_TAG_OVERRIDE: ${{ vars.ZLIB_NG_RELEASE_TAG }}
        ZLIB_NG_GITHUB_REPO_OVERRIDE: ${{ secrets.ZLIB_NG_GITHUB_REPO }}
        LIBPNG_RELEASE_TAG_OVERRIDE: ${{ vars.LIBPNG_RELEASE_TAG }}
        LIBPNG_GITHUB_REPO_OVERRIDE: ${{ secrets.LIBPNG_GITHUB_REPO }}
        SKIA_RELEASE_TAG_OVERRIDE: ${{ vars.SKIA_RELEASE_TAG }}
        SKIA_GITHUB_REPO_OVERRIDE: ${{ secrets.SKIA_GITHUB_REPO }}
      run: |
        for name in \
          SQLITE3_RELEASE_TAG SQLITE3_GITHUB_REPO \
          ZLIB_NG_RELEASE_TAG ZLIB_NG_GITHUB_REPO \
          LIBPNG_RELEASE_TAG LIBPNG_GITHUB_REPO \
          SKIA_RELEASE_TAG SKIA_GITHUB_REPO
        do
          value_name="${name}_OVERRIDE"
          if [ -n "${!value_name:-}" ]; then
            printf '%s=%s\n' "$name" "${!value_name}" >> "$GITHUB_ENV"
          fi
        done

    - name: Build VM
      shell: cmd
      run: |
        mkdir TotalCrossVM\vc2022
        pushd TotalCrossVM\vc2022
        cmake ..\ -G"Visual Studio 17 2022" -A Win32
        cmake --build . --config Release
        popd

    - name: Upload Windows build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows
        path: |
          TotalCrossVM/vc2022/Release/*.dll
          TotalCrossVM/vc2022/Release/*.exe

  build-sdk:
    name: Build `SDK`
    needs: checkout-source
    runs-on: ubuntu-22.04

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      run: tar -xzf source-code.tar.gz

    - name: Setup JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 11

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
        restore-keys: ${{ runner.os }}-gradle

    - name: Build SDK
      working-directory: scripts
      run: ./package-sdk.sh

    - name: Pack SDK build artifacts
      run: tar -czf sdk-build.tar.gz build/TotalCross

    - name: Upload SDK build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: sdk-build
        path: sdk-build.tar.gz

  build-android:
    name: Build `Android`
    needs: checkout-source
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      run: tar -xzf source-code.tar.gz

    - name: Export dependency overrides
      env:
        SQLITE3_RELEASE_TAG_OVERRIDE: ${{ vars.SQLITE3_RELEASE_TAG }}
        SQLITE3_GITHUB_REPO_OVERRIDE: ${{ secrets.SQLITE3_GITHUB_REPO }}
        ZLIB_NG_RELEASE_TAG_OVERRIDE: ${{ vars.ZLIB_NG_RELEASE_TAG }}
        ZLIB_NG_GITHUB_REPO_OVERRIDE: ${{ secrets.ZLIB_NG_GITHUB_REPO }}
        LIBPNG_RELEASE_TAG_OVERRIDE: ${{ vars.LIBPNG_RELEASE_TAG }}
        LIBPNG_GITHUB_REPO_OVERRIDE: ${{ secrets.LIBPNG_GITHUB_REPO }}
        SKIA_RELEASE_TAG_OVERRIDE: ${{ vars.SKIA_RELEASE_TAG }}
        SKIA_GITHUB_REPO_OVERRIDE: ${{ secrets.SKIA_GITHUB_REPO }}
      run: |
        for name in \
          SQLITE3_RELEASE_TAG SQLITE3_GITHUB_REPO \
          ZLIB_NG_RELEASE_TAG ZLIB_NG_GITHUB_REPO \
          LIBPNG_RELEASE_TAG LIBPNG_GITHUB_REPO \
          SKIA_RELEASE_TAG SKIA_GITHUB_REPO
        do
          value_name="${name}_OVERRIDE"
          if [ -n "${!value_name:-}" ]; then
            printf '%s=%s\n' "$name" "${!value_name}" >> "$GITHUB_ENV"
          fi
        done

    - name: Setup JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Fetch depot tools metadata
      run: TotalCrossVM/fetch-depot-tools.sh

    - name: Cache artifacts
      uses: actions/cache@v5
      with:
        path: |
          TotalCrossVM/deps/totalcross-depot-tools/skia/local
          TotalCrossVM/deps/totalcross-depot-tools/zlib-ng/local
          TotalCrossVM/deps/totalcross-depot-tools/libpng/local
          TotalCrossVM/deps/totalcross-depot-tools/sqlite3/local
          TotalCrossVM/deps/totalcross-depot-tools/mbedtls/local
          TotalCrossVM/android/tcvm/src/main/jniLibs
        key: native-deps-android-${{ hashFiles('TotalCrossVM/deps/totalcross-depot-tools/deps.yml', 'TotalCrossVM/fetch-depot-tools.sh') }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: ''

    - name: Cache Gradle packages
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches/modules-2
          ~/.gradle/caches/jars-*
          ~/.gradle/caches/transforms-*
          ~/.gradle/wrapper
        key: gradle-android-${{ runner.os }}-${{ hashFiles('TotalCrossVM/android/**/*.gradle', 'TotalCrossVM/android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-android-${{ runner.os }}-

    - name: Build Android
      working-directory: scripts
      run: ./package-android.sh

    - name: Upload Android build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: android
        path: build/TotalCross/dist/vm/android/TotalCross.aab

  build-ios:
    name: Build `iOS`
    needs: checkout-source
    runs-on: macos-15

    steps:
    - name: Download source code
      uses: actions/download-artifact@v7
      with:
        name: source-code

    - name: Extract source code
      run: tar -xzf source-code.tar.gz

    - name: Export dependency overrides
      env:
        SQLITE3_RELEASE_TAG_OVERRIDE: ${{ vars.SQLITE3_RELEASE_TAG }}
        SQLITE3_GITHUB_REPO_OVERRIDE: ${{ secrets.SQLITE3_GITHUB_REPO }}
        ZLIB_NG_RELEASE_TAG_OVERRIDE: ${{ vars.ZLIB_NG_RELEASE_TAG }}
        ZLIB_NG_GITHUB_REPO_OVERRIDE: ${{ secrets.ZLIB_NG_GITHUB_REPO }}
        LIBPNG_RELEASE_TAG_OVERRIDE: ${{ vars.LIBPNG_RELEASE_TAG }}
        LIBPNG_GITHUB_REPO_OVERRIDE: ${{ secrets.LIBPNG_GITHUB_REPO }}
        SKIA_RELEASE_TAG_OVERRIDE: ${{ vars.SKIA_RELEASE_TAG }}
        SKIA_GITHUB_REPO_OVERRIDE: ${{ secrets.SKIA_GITHUB_REPO }}
      run: |
        for name in \
          SQLITE3_RELEASE_TAG SQLITE3_GITHUB_REPO \
          ZLIB_NG_RELEASE_TAG ZLIB_NG_GITHUB_REPO \
          LIBPNG_RELEASE_TAG LIBPNG_GITHUB_REPO \
          SKIA_RELEASE_TAG SKIA_GITHUB_REPO
        do
          value_name="${name}_OVERRIDE"
          if [ -n "${!value_name:-}" ]; then
            printf '%s=%s\n' "$name" "${!value_name}" >> "$GITHUB_ENV"
          fi
        done

    - name: Fetch depot tools metadata
      run: TotalCrossVM/fetch-depot-tools.sh

    - name: Cache artifacts
      uses: actions/cache@v5
      with:
        path: |
          TotalCrossVM/deps/totalcross-depot-tools/skia/local
          TotalCrossVM/deps/totalcross-depot-tools/zlib-ng/local
          TotalCrossVM/deps/totalcross-depot-tools/libpng/local
          TotalCrossVM/deps/totalcross-depot-tools/sqlite3/local
          TotalCrossVM/deps/totalcross-depot-tools/mbedtls/local
        key: native-deps-ios-${{ hashFiles('TotalCrossVM/deps/totalcross-depot-tools/deps.yml', 'TotalCrossVM/fetch-depot-tools.sh') }}

    - name: Cache CocoaPods
      uses: actions/cache@v5
      with:
        path: |
          TotalCrossVM/xcode/Pods
          ~/Library/Caches/CocoaPods
          ~/.cocoapods/repos
        key: cocoapods-ios-${{ hashFiles('TotalCrossVM/xcode/Podfile') }}
        restore-keys: |
          cocoapods-ios-

    - name: Show tool versions
      run: |
        xcodebuild -version
        cmake --version
        pod --version

    - name: Install xcodebuild formatter
      run: brew install xcbeautify

    - name: Install iOS signing assets
      if: ${{ inputs.signed-ios }}
      env:
        IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      run: |
        set -euo pipefail

        if [ -z "$IOS_CERTIFICATE_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISION_PROFILE_BASE64" ] || [ -z "$IOS_KEYCHAIN_PASSWORD" ]; then
          echo "::error::Missing iOS signing secrets. Configure IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD, IOS_PROVISION_PROFILE_BASE64, and IOS_KEYCHAIN_PASSWORD."
          exit 1
        fi

        certificate_path="${RUNNER_TEMP}/ios-signing-certificate.p12"
        profile_path="${RUNNER_TEMP}/TotalCross_VM.mobileprovision"
        profile_plist_path="${RUNNER_TEMP}/TotalCross_VM.plist"
        keychain_path="${RUNNER_TEMP}/ios-signing.keychain-db"

        printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
        printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$profile_path"

        security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
        security set-keychain-settings -lut 21600 "$keychain_path"
        security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
        security import "$certificate_path" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
        security list-keychain -d user -s "$keychain_path"
        security default-keychain -s "$keychain_path"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"

        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        security cms -D -i "$profile_path" > "$profile_plist_path"
        profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist_path")"
        profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist_path")"
        profile_team_id="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist_path")"
        profile_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist_path")"

        if [[ "$profile_app_id" != *.com.totalcross.vm && "$profile_app_id" != *.com.totalcross.* ]]; then
          echo "::error::The installed iOS provisioning profile is for '${profile_app_id}', but this build requires com.totalcross.vm or a matching wildcard profile."
          exit 1
        fi

        cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/${profile_uuid}.mobileprovision"
        {
          echo "IOS_PROVISION_PROFILE_SPECIFIER=${profile_name}"
          echo "IOS_PROVISION_PROFILE_UUID=${profile_uuid}"
          echo "IOS_TEAM_ID=${profile_team_id}"
        } >> "$GITHUB_ENV"

        echo "Installed iOS provisioning profile '${profile_name}' (${profile_uuid}) for team '${profile_team_id}' and app id '${profile_app_id}'."

    - name: Generate and patch Xcode project
      working-directory: TotalCrossVM/xcode
      run: |
        cmake ../ -GXcode
        ruby -pi -e "gsub(\"config.build_settings['ARCHS[sdk=iphonesimulator*]'] = 'x86_64'\", \"config.build_settings['ARCHS[sdk=iphonesimulator*]'] = 'arm64'\")" Podfile
        pod install
        /usr/libexec/PlistBuddy -c "Add :DisableBuildSystemDeprecationDiagnostic bool" TotalCross.xcworkspace/xcshareddata/WorkspaceSettings.xcsettings || true
        /usr/libexec/PlistBuddy -c "Set :DisableBuildSystemDeprecationDiagnostic true" TotalCross.xcworkspace/xcshareddata/WorkspaceSettings.xcsettings
        ruby ../../scripts/fix-ios-xcode-dependencies.rb TCVM.xcodeproj/project.pbxproj

    - name: Build iOS archive for device
      working-directory: TotalCrossVM/xcode
      env:
        SIGN_IOS: ${{ inputs.signed-ios }}
      run: |
        set -o pipefail
        mkdir -p build/logs

        signing_args=()
        if [ "$SIGN_IOS" = "true" ]; then
          signing_args=(
            DEVELOPMENT_TEAM="${IOS_TEAM_ID}"
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROVISION_PROFILE_SPECIFIER}"
            teamID="${IOS_TEAM_ID}"
          )
        else
          signing_args=(
            CODE_SIGNING_ALLOWED=NO
          )
        fi

        xcodebuild \
          -workspace TotalCross.xcworkspace \
          -scheme TotalCross \
          BUILD_DIR=${PWD} \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/TotalCross.xcarchive \
          -resultBundlePath build/logs/TotalCross.xcresult \
          "${signing_args[@]}" \
          archive \
          2>&1 | tee build/logs/xcodebuild-raw.log | xcbeautify

    - name: Export signed iOS IPA
      if: ${{ inputs.signed-ios }}
      working-directory: TotalCrossVM/xcode
      run: |
        set -o pipefail
        /usr/libexec/PlistBuddy -c "Set :teamID ${IOS_TEAM_ID}" ExportOptions.plist
        /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.totalcross.vm ${IOS_PROVISION_PROFILE_SPECIFIER}" ExportOptions.plist
        xcodebuild \
          -exportArchive \
          -archivePath build/TotalCross.xcarchive \
          -exportPath build/TotalCross.ipa \
          -exportOptionsPlist ExportOptions.plist \
          2>&1 | tee build/logs/xcodebuild-export-raw.log | xcbeautify

    - name: Upload iOS xcodebuild diagnostics
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ios-xcodebuild-diagnostics
        path: |
          TotalCrossVM/xcode/build/logs/xcodebuild-raw.log
          TotalCrossVM/xcode/build/logs/xcodebuild-export-raw.log
          TotalCrossVM/xcode/build/logs/TotalCross.xcresult
        if-no-files-found: warn

    - name: Pack iOS artifacts
      env:
        SIGN_IOS: ${{ inputs.signed-ios }}
      run: |
        if [ "$SIGN_IOS" = "true" ]; then
          tar -czf ios.tar.gz -C TotalCrossVM/xcode/build TotalCross.xcarchive TotalCross.ipa
        else
          tar -czf ios.tar.gz -C TotalCrossVM/xcode/build TotalCross.xcarchive
        fi

    - name: Upload iOS build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ios
        path: ios.tar.gz
