	mainClass = 'tc.Deploy'
	args = [
		tcuiJar.archiveFile.get().asFile,
		'/n', 'TCUI',
		'/a', 'TCvm'
		]
	classpath = files(
        jar.archiveFile,
        configurations.runtimeClasspath)
