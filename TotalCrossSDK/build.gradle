task fetchSdkNativeRuntime {
	group = 'build setup'
	description = 'Fetches native runtime DLLs distributed with the SDK.'

	inputs.file(depotToolsFetchScript)
	inputs.property('vcruntimeReleaseTag', optionalInput(vcruntimeReleaseTag))
	inputs.property('vcruntimeGithubRepo', optionalInput(vcruntimeGithubRepo))
	outputs.file(vcruntimeDll)

	doLast {
		providers.exec {
			commandLine 'bash', depotToolsFetchScript.absolutePath
		}.result.get().assertNormalExitValue()

		if (!vcruntimeFetchScript.isFile()) {
			throw GradleException("Could not find vcruntime fetch script at ${vcruntimeFetchScript}")
		}

		providers.exec {
			def fetchArgs = [
				'bash',
				vcruntimeFetchScript.absolutePath,
				'--platform', 'windows',
				'--arch', 'x86',
				'--github-token-env', 'VCRUNTIME_GITHUB_TOKEN'
			]
			addOptionalArg(fetchArgs, '--release-tag', vcruntimeReleaseTag)
			addOptionalArg(fetchArgs, '--github-repo', vcruntimeGithubRepo)

			commandLine fetchArgs
		}.result.get().assertNormalExitValue()
	}
}

task copySdkDependencies(type: Copy, dependsOn: fetchSdkNativeRuntime) {
	doFirst {
		delete destinationDir
	}
	from({ configurations.runtimeClasspath.findAll { it.name.endsWith('.jar') } })
	from(vcruntimeLocalDir) {
		include '*.dll'
	}
	into 'dist/libs'
}

task dist(dependsOn: [build, copySdkDependencies, 'sourcesJar', 'javadocJar']) {

	doLast{
		copy { 
			from 'etc/fonts/TCFont.tcz'
			from 'build/libs/TCUI.tcz'
			from 'build/libs/tc.base.lang.tcz'
            from 'build/libs/tc.base.util.tcz'
            from 'build/libs/tc.base.misc.tcz'
			into 'dist/vm/'
		}
	
		copy { 
			from jar.archiveFile
			into 'dist/'
			rename  { String fileName ->
	    				fileName.replace('-' + project.version, '')
	  		}
		}
	}
}

def featureSmokeClassesDir = layout.buildDirectory.dir('feature-smoke/classes')
def featureSmokeSdkJar = file('dist/totalcross-sdk.jar')
def featureSmokeSources = fileTree('src/test/resources/modernjava/smoke') {
	include '*.java'
}

tasks.register('compileModernJavaFeatureSmoke', JavaCompile) {
	group = 'verification'
	description = 'Compiles the aggregate modern Java feature smoke app against the generated SDK.'

	source featureSmokeSources
	classpath = files(featureSmokeSdkJar)
	destinationDirectory = featureSmokeClassesDir
	options.encoding = 'UTF-8'
	options.release.set(17)

	doFirst {
		if (!featureSmokeSdkJar.isFile()) {
			throw new GradleException('Run ./gradlew dist -x test before compiling the feature smoke app.')
		}
	}
}

tasks.register('deployModernJavaFeatureSmoke', JavaExec) {
	group = 'verification'
	description = 'Deploys the aggregate modern Java feature smoke app with the generated SDK.'
	dependsOn 'copySdkDependencies', 'compileModernJavaFeatureSmoke'

	mainClass = 'tc.Deploy'
	classpath = files(featureSmokeSdkJar) + fileTree('dist/libs') {
		include '*.jar'
	}
	workingDir featureSmokeClassesDir.get().asFile
    
    doFirst {
        def os = System.getProperty("os.name").toLowerCase()
        def platformArg

        if (os.contains("win")) {
            platformArg = "-win32"
        } else if (os.contains("mac")) {
            platformArg = "-macos"
        } else if (os.contains("linux")) {
            platformArg = "-linux"
        } else {
            throw new GradleException("Unsupported operating system: ${System.getProperty("os.name")}")
        }

        args = [
            'smoke/FeatureSmokeApp.class',
            platformArg
        ]
    }
}

build.finalizedBy(deployTcbaselang, deployTcbaseutil, deployTcbasemisc, deployTcui)

/**
    Sources
*/
task sourcesJar(type: Jar) {
    archiveClassifier = 'sources'
    from (sourceSets.main.allSource) { 
    	exclude 'tc/**', '**/*4A.java', '**/*4D.java'
    }
}
javadoc.finalizedBy(sourcesJar)

/** 
    Javadoc
 */
task javadocJar(type: Jar) {
    archiveClassifier = 'javadoc'
    from javadoc {
    	exclude 'jdkcompat*/**', 'tc/**', '**/*4A.java', '**/*4D.java'
    }
}
javadoc.finalizedBy(javadocJar)

artifacts {
    archives sourcesJar, javadocJar, tcbaselangJar, tcbaseutilJar, tcbasemiscJar, tcuiJar
}
